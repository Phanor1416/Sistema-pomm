<index.html>
<html>
<head>
  <title>Sistema Aires PRO - Final Mejorado</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; background: #eef2f7; padding: 20px; }
    .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input, select, button { margin: 5px 0; padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 5px; text-align: center; }
    th { background: #007bff; color: white; }
    h3 { margin-bottom: 5px; }
    .totales { display: flex; gap: 20px; flex-wrap: wrap; }
    .totales div { flex: 1; background: #f5f5f5; padding: 10px; border-radius: 8px; min-width: 300px; }
  </style>
</head>
<body>

<h2>📱 Sistema Aires PRO - Final Mejorado</h2>

<div class="card">
  <input type="text" id="proyecto" placeholder="Nombre del Proyecto">
  <input type="text" id="tecnico" placeholder="Nombre del Técnico">
</div>

<div class="card">
  <h3>Agregar Tipo de Equipo</h3>
  <select id="tipoEquipo">
    <option value="Split">Split</option>
    <option value="Cassette">Cassette</option>
    <option value="Piso Techo">Piso Techo</option>
    <option value="KC">KC</option>
  </select>
  <input type="number" id="btuEquipo" placeholder="BTU">
  <select id="refriEquipo">
    <option value="20">R410 (20 g/m)</option>
    <option value="15">R32 (15 g/m)</option>
    <option value="25">R22 (25 g/m)</option>
  </select>
  <input type="number" id="cantidadEquipo" placeholder="Cantidad de unidades">
  <button onclick="agregarTipoEquipo()">Agregar Tipo de Equipo</button>
</div>

<div class="card">
  <h3>Equipos pendientes</h3>
  <ul id="equiposPendientes"></ul>
</div>

<div class="card">
  <button onclick="generarHojasVida()">Generar Hojas de Vida de Todas las Unidades</button>
</div>

<div class="card" id="unidadesContainer">
  <h3>Hoja de Vida de Cada Unidad</h3>
</div>

<div class="card">
  <button onclick="calcularTotales()">Calcular Totales y Mostrar Resumen</button>
</div>

<div class="card">
  <button onclick="limpiarTodo()">🧹 Limpiar Todo</button>
</div>

<div class="card">
  <h3>Resumen por Unidad</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Totales del Proyecto</h3>
  <div class="totales" id="totalesProyecto"></div>
  <button onclick="exportarExcel()">💾 Exportar a Excel</button>
</div>

<script>
const CILINDROKG = 11;
const GASMAC_POR_UNION_CODO = 0.05; 
const VARILLAS_POR_UNION_CODO = 1;
const TUBO_LONG = 6;

let equiposPendientes = [];

function cargaBase(btu) {
  if (btu <= 12000) return 500;
  if (btu <= 18000) return 800;
  if (btu <= 24000) return 1200;
  if (btu <= 36000) return 1800;
  return 2500;
}

function agregarTipoEquipo() {
  const tipo = document.getElementById("tipoEquipo").value;
  const btu = parseFloat(document.getElementById("btuEquipo").value);
  const refri = parseFloat(document.getElementById("refriEquipo").value);
  const cantidad = parseInt(document.getElementById("cantidadEquipo").value);
  if(!btu || !cantidad || cantidad<=0) { alert("Ingresa datos válidos"); return; }
  equiposPendientes.push({tipo,btu,refri,cantidad});
  actualizarListaPendientes();
  document.getElementById("btuEquipo").value="";
  document.getElementById("cantidadEquipo").value="";
}

function actualizarListaPendientes() {
  const lista = document.getElementById("equiposPendientes");
  lista.innerHTML="";
  equiposPendientes.forEach(eq=>{
    const li=document.createElement("li");
    li.innerText=`${eq.cantidad} x ${eq.tipo} | BTU: ${eq.btu} | Refrigerante: ${eq.refri} g/m`;
    lista.appendChild(li);
  });
}

function generarHojasVida() {
  const container=document.getElementById("unidadesContainer");
  container.innerHTML="<h3>Hoja de Vida de Cada Unidad</h3>";
  let unidadNum=1;
  equiposPendientes.forEach(eq=>{
    for(let i=0;i<eq.cantidad;i++){
      const div=document.createElement("div");
      div.className="unidad";
      div.innerHTML=`
        <h4>Unidad ${unidadNum} (${eq.tipo}) - ${eq.btu} BTU</h4>
        <label>Nombre de la unidad:</label>
        <input type="text" class="nombreUnidad" placeholder="Nombre de la unidad">
        <input type="hidden" class="tipoUnidad" value="${eq.tipo}">
        <input type="hidden" class="btuUnidad" value="${eq.btu}">
        <input type="hidden" class="refriUnidad" value="${eq.refri}">
        <table>
          <tr><th></th><th>Metros</th><th>Diámetro</th><th>Codos</th></tr>
          <tr>
            <td>Alta</td>
            <td><input type="number" class="metrosAlta" value="2" min="0" step="0.1"></td>
            <td>
              <select class="diametroAlta">
                <option value="3/8">3/8"</option>
                <option value="1/2">1/2"</option>
                <option value="5/8">5/8"</option>
                <option value="3/4">3/4"</option>
              </select>
            </td>
            <td><input type="number" class="codosAlta" value="0" min="0" step="1"></td>
          </tr>
          <tr>
            <td>Baja</td>
            <td><input type="number" class="metrosBaja" value="2" min="0" step="0.1"></td>
            <td>
              <select class="diametroBaja">
                <option value="3/8">3/8"</option>
                <option value="1/2">1/2"</option>
                <option value="5/8">5/8"</option>
                <option value="3/4">3/4"</option>
                <option value="7/8">7/8"</option>
                <option value="1">1"</option>
                <option value="1 1/8">1 1/8"</option>
              </select>
            </td>
            <td><input type="number" class="codosBaja" value="0" min="0" step="1"></td>
          </tr>
        </table>
      `;
      container.appendChild(div);
      unidadNum++;
    }
  });
}

function calcularTotales() {
  const unidades = document.querySelectorAll(".unidad");
  const resumen = document.getElementById("lista");
  resumen.innerHTML="";
  const proyecto = document.getElementById("proyecto").value || "Sin nombre de proyecto";
  const tecnico = document.getElementById("tecnico").value || "Sin técnico";

  let totalRefrigerante=0, cilindros=0, totalMetrosAlta=0, totalMetrosBaja=0;
  let tubosPorDiametro={}, tirillasDiam={}, totalCodos=0, totalVarillas=0, totalGasMac=0;
  let totalUnionesAlta=0, totalUnionesBaja=0;

  unidades.forEach(u=>{
    const nombre=u.querySelector(".nombreUnidad").value || "Sin Nombre";
    const tipo=u.querySelector(".tipoUnidad").value;
    const btu=parseFloat(u.querySelector(".btuUnidad").value);
    const refri=parseFloat(u.querySelector(".refriUnidad").value);

    const metrosAlta=parseFloat(u.querySelector(".metrosAlta").value);
    const diametroAlta=u.querySelector(".diametroAlta").value;
    const codosAlta=parseInt(u.querySelector(".codosAlta").value);

    const metrosBaja=parseFloat(u.querySelector(".metrosBaja").value);
    const diametroBaja=u.querySelector(".diametroBaja").value;
    const codosBaja=parseInt(u.querySelector(".codosBaja").value);

    const base=cargaBase(btu);
    const extra=(metrosAlta+metrosBaja)*refri;
    const refrigerante=(base+extra)/1000;
    totalRefrigerante+=refrigerante;

    totalMetrosAlta+=metrosAlta;
    totalMetrosBaja+=metrosBaja;

    // Tubos por diámetro
    const tubosAlta=Math.ceil(metrosAlta/TUBO_LONG);
    const tubosBaja=Math.ceil(metrosBaja/TUBO_LONG);

    tubosPorDiametro[diametroAlta]=(tubosPorDiametro[diametroAlta]||0)+tubosAlta;
    tubosPorDiametro[diametroBaja]=(tubosPorDiametro[diametroBaja]||0)+tubosBaja;

    // Tirillas
    tirillasDiam[diametroAlta]=(tirillasDiam[diametroAlta]||0)+tubosAlta;
    tirillasDiam[diametroBaja]=(tirillasDiam[diametroBaja]||0)+tubosBaja;

    // Uniones
    totalUnionesAlta+=tubosAlta;
    totalUnionesBaja+=tubosBaja;

    // Codos
    totalCodos+=codosAlta+codosBaja;

    // Varillas y Gas MAC
    totalVarillas+=(tubosAlta+tubosBaja+codosAlta+codosBaja)*VARILLAS_POR_UNION_CODO;
    totalGasMac+=(tubosAlta+tubosBaja+codosAlta+codosBaja)*GASMAC_POR_UNION_CODO;

    resumen.innerHTML+=`
      <p>
      <strong>${nombre} (${tipo}, ${btu} BTU):</strong><br>
      Tubería ALTA: ${metrosAlta} m (${diametroAlta}), Codos: ${codosAlta}, Uniones: ${tubosAlta}<br>
      Tubería BAJA: ${metrosBaja} m (${diametroBaja}), Codos: ${codosBaja}, Uniones: ${tubosBaja}<br>
      Tirillas: ${tubosAlta+tubosBaja}, Varillas: ${(tubosAlta+tubosBaja+codosAlta+codosBaja)}, Gas MAC: ${(tubosAlta+tubosBaja+codosAlta+codosBaja)*0.05}<br>
      Refrigerante: ${refrigerante.toFixed(2)} kg
      </p>`;
  });

  cilindros=Math.ceil(totalRefrigerante/CILINDROKG);

  const totalesDiv=document.getElementById("totalesProyecto");
  let totalInstaladoHTML="<h4>Total Instalado</h4><table><tr><th>Diámetro</th><th>Tubos</th><th>Metros</th></tr>";
  for(const diam in tubosPorDiametro){
    const metros=(diametrosMetros(diam, tubosPorDiametro[diam]));
    totalInstaladoHTML+=`<tr><td>${diam}</td><td>${tubosPorDiametro[diam]}</td><td>${metros.toFixed(2)}</td></tr>`;
  }
  totalInstaladoHTML+="</table>";

  let replanteoHTML=`
    <h4>Replanteo</h4>
    <p>Total Codos: ${totalCodos}</p>
    <p>Total Uniones: ${totalUnionesAlta+totalUnionesBaja}</p>
    <p>Total Tirillas: ${Object.values(tirillasDiam).reduce((a,b)=>a+b,0)}</p>
    <p>Total Varillas: ${totalVarillas}</p>
    <p>Total Gas MAC: ${totalGasMac.toFixed(2)} botellas</p>
    <p>Total Refrigerante: ${totalRefrigerante.toFixed(2)} kg</p>
    <p>Cilindros: ${cilindros}</p>
    <p>Proyecto: ${proyecto}</p>
    <p>Técnico: ${tecnico}</p>`;

  totalesDiv.innerHTML=`<div>${totalInstaladoHTML}</div><div>${replanteoHTML}</div>`;
}

function diametrosMetros(diam, tubos){ return tubos*TUBO_LONG; }

function exportarExcel() {
  const wb=XLSX.utils.book_new();
  const ws_data=[["Unidad","Tipo","BTU","Nombre","Metros ALTA","Diam ALTA","Codos ALTA","Uniones ALTA","Metros BAJA","Diam BAJA","Codos BAJA","Uniones BAJA"]];
  const unidades=document.querySelectorAll(".unidad");
  unidades.forEach(u=>{
    const metrosAlta=parseFloat(u.querySelector(".metrosAlta").value);
    const metrosBaja=parseFloat(u.querySelector(".metrosBaja").value);
    ws_data.push([
      u.querySelector(".tipoUnidad").value,
      u.querySelector(".tipoUnidad").value,
      u.querySelector(".btuUnidad").value,
      u.querySelector(".nombreUnidad").value || "Sin Nombre",
      metrosAlta,
      u.querySelector(".diametroAlta").value,
      u.querySelector(".codosAlta").value,
      Math.ceil(metrosAlta/TUBO_LONG),
      metrosBaja,
      u.querySelector(".diametroBaja").value,
      u.querySelector(".codosBaja").value,
      Math.ceil(metrosBaja/TUBO_LONG)
    ]);
  });
  const ws=XLSX.utils.aoa_to_sheet(ws_data);
  XLSX.utils.book_append_sheet(wb, ws, "Hojas de Vida");
  XLSX.writeFile(wb, "Proyecto_AiresPRO.xlsx");
}

function limpiarTodo() {
  equiposPendientes=[];
  document.getElementById("equiposPendientes").innerHTML="";
  document.getElementById("unidadesContainer").innerHTML="<h3>Hoja de Vida de Cada Unidad</h3>";
  document.getElementById("lista").innerHTML="";
  document.getElementById("totalesProyecto").innerHTML="";
  document.getElementById("proyecto").value="";
  document.getElementById("tecnico").value="";
}
</script>

</body>
</html>
